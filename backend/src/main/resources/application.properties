# Spring Boot Application Configurations
spring.application.name=grameencraft-backend
server.port=8080

# PostgreSQL database connection configuration
# Adjust host, port, dbname, username, and password when deploying to production environment
spring.datasource.url=jdbc:postgresql://localhost:5432/grameencraft
spring.datasource.username=postgres
spring.datasource.password=your_secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Custom Configurations for GrameenCraft APIs
# Add your Gemini API Key here for server-side generation
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}

# Enable CORS for frontend connectivity (default React local server is http://localhost:3000 or port 5173)
grameencraft.cors.allowed-origins=http://localhost:3000,http://localhost:5173
